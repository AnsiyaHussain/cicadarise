{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CICADA RISE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&family=Marcellus&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ece1d2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Jost', sans-serif;
        }

        .preloader-container {
            text-align: center;
        }

        .logo-wrapper {
            width: 220px;
            height: 220px;
            margin: 0 auto 40px;
            position: relative;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(89, 37, 24, 0.5));
            animation: logoGlow 4s ease-in-out infinite;
        }

        /* Loading Ring around the logo */
        .loading-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 3px solid rgba(89, 37, 24, 0.15);
            border-top-color: #592518;
            border-radius: 50%;
            animation: spin 1.8s linear infinite;
        }

        .brand-text {
            font-family: var(--heading-font);
            font-size: 2.4rem;
            letter-spacing: 10px;
            color: #592518;
            font-weight: 300;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        .loading-text {
            font-size: 1rem;
            color: #592518;
            letter-spacing: 5px;
            font-weight: 400;
            opacity: 0.75;
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(89, 37, 24, 0.4)); }
            50% { filter: drop-shadow(0 0 50px rgba(89, 37, 24, 0.7)); }
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="preloader-container">
        <div class="logo-wrapper">
            <img src="{% static 'images/mainlogo.png' %}" alt="CICADA RISE">
            <div class="loading-ring"></div>
        </div>

        <!-- <div class="brand-text">CICADA RISE</div> -->
        <div class="loading-text" style="margin-left: 10px;">  Emerging...</div>
    </div>

    <script>
        // Redirect to index after 4 seconds (gives enough time to appreciate the animation)
        setTimeout(function() {
            window.location.href = "{% url 'index' %}";
        }, 4000);
    </script>

</body>
</html>
