{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CICADA RISE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&family=Marcellus&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #592518;
            --accent: #8C907E;
            --bg: #ece1d2;
        }
        body {
            background: linear-gradient(135deg, #ece1d2 0%, #f5eedf 100%);
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(89, 37, 24, 0.12);
            padding: 45px 40px;
            max-width: 420px;
            margin: 0 auto;
            animation: fadeInUp 0.9s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-title {
            font-family: var(--heading-font);
            color: var(--primary);
            letter-spacing: 3px;
        }
        .form-control {
            border: 2px solid #d4c3b0;
            border-radius: 12px;
            padding: 14px 18px;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(89, 37, 24, 0.15);
        }
        .btn-login {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 1.05rem;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #3f1c12;
            transform: translateY(-2px);
        }
        .cicada-icon {
            font-size: 3.8rem;
            color: var(--primary);
            opacity: 0.12;
            animation: float 7s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
</head>
<body>

  <div class="container">
    <div class="login-card text-center">
      <!-- Floating Cicada Icon -->
      <div class="mb-4">
        <span class="cicada-icon">🪲</span>
      </div>
      
      <h2 class="section-title mb-3">Welcome Back</h2>
      <p class="text-muted mb-4">Sign in to continue your journey</p>

      <!-- Toast Messages - Only Login Related -->
      <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
        {% if messages %}
          {% for message in messages %}
            {% if 'login' in message.tags %}
              <div class="toast align-items-center text-white {% if 'success' in message.tags %}bg-success{% else %}bg-danger{% endif %}" 
                   role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="2000">
                <div class="d-flex">
                  <div class="toast-body">
                    <i class="fas {% if 'success' in message.tags %}fa-check-circle{% else %}fa-exclamation-circle{% endif %} me-2"></i>
                    {{ message }}
                  </div>
                  <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
              </div>
            {% endif %}
          {% endfor %}
        {% endif %}
      </div>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-4">
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-login w-100 py-3 text-uppercase">
          Login
        </button>
      </form>

      <div class="text-center mt-4">
        Don't have an account? 
        <a href="{% url 'signup' %}" style="color: var(--primary); text-decoration: none; font-weight: 500;">
          Sign Up
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Auto fade toast messages after 2 seconds
    document.addEventListener('DOMContentLoaded', function() {
      const toasts = document.querySelectorAll('.toast');
      toasts.forEach(toastEl => {
        const toast = new bootstrap.Toast(toastEl, { delay: 2000 });
        toast.show();
      });
    });
  </script>
</body>
</html>
